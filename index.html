<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>
<style>
  :root {
    --bg: #12141c;
    --bg-raised: #1a1d28;
    --line: #2a2e3d;
    --text: #e9eaee;
    --text-dim: #8b8f9e;
    --accent: #f2b705;
    --accent-dim: #7a611f;
    --ok: #4fd1c5;
    --font-display: 'Space Grotesk', system-ui, sans-serif;
    --font-body: 'IBM Plex Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(circle at 20% 15%, rgba(242, 183, 5, 0.06), transparent 40%),
      radial-gradient(circle at 80% 85%, rgba(79, 209, 197, 0.05), transparent 40%);
  }

  .layout {
    width: 100%;
    max-width: 1080px;
    display: flex;
    gap: 20px;
    align-items: stretch;
  }

  .card {
    flex: 0 0 320px;
    min-width: 0;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px 26px 24px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
  }

  .panel {
    flex: 1 1 auto;
    min-width: 0;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 36px 40px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }

  .panel-header h2 {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .panel-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .panel-body {
    font-size: 16px;
    line-height: 1.8;
    color: var(--text);
    overflow-y: auto;
    flex: 1;
    white-space: pre-wrap;
  }

  .panel-body a {
    color: var(--ok);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .panel-body.placeholder {
    color: var(--text-dim);
    font-style: italic;
  }

  .panel-body.pending {
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 13px;
  }

  .panel-body.error {
    color: #f27070;
  }

  @media (max-width: 760px) {
    .layout {
      flex-direction: column;
    }
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--ok);
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 0 0 rgba(79, 209, 197, 0.6);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(79, 209, 197, 0.55); }
    70%  { box-shadow: 0 0 0 8px rgba(79, 209, 197, 0); }
    100% { box-shadow: 0 0 0 0 rgba(79, 209, 197, 0); }
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(1.6rem, 3vw, 2rem);
    line-height: 1.1;
    margin: 0 0 10px;
    letter-spacing: -0.01em;
  }

  h1 span {
    color: var(--accent);
  }

  p.lead {
    color: var(--text-dim);
    font-size: 13.5px;
    line-height: 1.5;
    margin: 0 0 24px;
  }

  .console {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #0d0f16;
    overflow: hidden;
  }

  .console-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
  }

  .console-header .chip {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--line);
  }

  .console-header span.label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 6px;
    letter-spacing: 0.05em;
  }

  #log {
    max-height: 140px;
    overflow-y: auto;
    padding: 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.6;
  }

  #log .entry {
    color: var(--text);
    opacity: 0;
    animation: appear 0.25s ease forwards;
  }

  #log .entry .ts {
    color: var(--text-dim);
    margin-right: 8px;
  }

  #log .entry .meta {
    color: var(--accent);
    margin-right: 8px;
  }

  #log .placeholder {
    color: var(--text-dim);
    font-style: italic;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  form {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
    padding: 12px 14px;
    border-top: 1px solid var(--line);
  }

  form .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .prompt-symbol {
    font-family: var(--font-mono);
    color: var(--accent);
    font-size: 14px;
  }

  input[type="text"] {
    flex: 1 1 140px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 6px 0;
    min-width: 0;
  }

  input[type="text"]::placeholder,
  input[type="number"]::placeholder {
    color: var(--text-dim);
  }

  select#engine-select,
  input[type="number"]#word-count-input {
    background: #12141c;
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 7px 8px;
    outline: none;
  }

  select#engine-select {
    cursor: pointer;
  }

  input[type="number"]#word-count-input {
    width: 90px;
  }

  select#engine-select:focus-visible,
  input[type="number"]#word-count-input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  button {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #0d0f16;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 9px 16px;
    cursor: pointer;
    transition: filter 0.15s ease, transform 0.15s ease;
  }

  button:hover {
    filter: brightness(1.08);
  }

  button:active {
    transform: scale(0.97);
  }

  button:focus-visible,
  input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  footer {
    margin-top: 22px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  @media (prefers-reduced-motion: reduce) {
    .dot { animation: none; }
    #log .entry { animation: none; opacity: 1; }
  }
</style>
</head>
<body>

  <div class="layout">
  <main class="card">
    <div class="status-row">
      <span class="dot"></span>
      <span>Status: Live</span>
    </div>

    <h1>Hello<span>.</span></h1>
    <p class="lead">My website is live. Type a topic, pick a source, and set a word count — Claude will research it and write a summary on the right.</p>

    <div class="console">
      <div class="console-header">
        <span class="chip"></span>
        <span class="chip"></span>
        <span class="chip"></span>
        <span class="label">console</span>
      </div>

      <div id="log">
        <div class="entry placeholder" id="placeholder-line">Waiting for input&hellip;</div>
      </div>

      <form id="entry-form">
        <div class="input-row">
          <span class="prompt-symbol">&gt;</span>
          <input
            type="text"
            id="entry-input"
            placeholder="Type a topic"
            autocomplete="off"
            maxlength="200"
          />
        </div>
        <select id="engine-select" aria-label="Search source">
          <option value="google">google.com</option>
          <option value="scholar">Google Scholar</option>
          <option value="pubmed">PubMed</option>
        </select>
        <input
          type="number"
          id="word-count-input"
          placeholder="Word count"
          min="1"
          aria-label="Word count"
          style="width: 100%;"
        />
        <button type="submit" style="width: 100%;">Enter</button>
      </form>
    </div>

    <footer>Press Enter or click the button to submit.</footer>
  </main>

  <aside class="panel">
    <div class="panel-header">
      <h2>Summary</h2>
      <span class="panel-meta" id="panel-meta"></span>
    </div>
    <div class="panel-body placeholder" id="panel-body">Your summary will appear here once you submit a topic.</div>
  </aside>
  </div>

  <script>
    // Replace this with your deployed Worker URL from Step 2
    const WORKER_URL = 'https://claude-search-proxy.earnestchen-search.workers.dev';

    const form = document.getElementById('entry-form');
    const input = document.getElementById('entry-input');
    const engineSelect = document.getElementById('engine-select');
    const wordCountInput = document.getElementById('word-count-input');
    const log = document.getElementById('log');
    const placeholder = document.getElementById('placeholder-line');
    const panelBody = document.getElementById('panel-body');
    const panelMeta = document.getElementById('panel-meta');

    const ENGINE_LABELS = {
      google: 'google.com',
      scholar: 'Google Scholar',
      pubmed: 'PubMed'
    };

    function timestamp() {
      const d = new Date();
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function addLogEntry(metaText, bodyText) {
      const entry = document.createElement('div');
      entry.className = 'entry';

      const ts = document.createElement('span');
      ts.className = 'ts';
      ts.textContent = timestamp();

      const meta = document.createElement('span');
      meta.className = 'meta';
      meta.textContent = metaText;

      entry.appendChild(ts);
      entry.appendChild(meta);
      entry.appendChild(document.createTextNode(bodyText));

      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
      return entry;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function linkify(str) {
      const escaped = escapeHtml(str);
      return escaped.replace(/(https?:\/\/[^\s)]+)/g, (url) => {
        return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
      });
    }

    function setPanel(state, text) {
      panelBody.className = 'panel-body' + (state ? ' ' + state : '');
      if (state === 'pending' || state === 'error' || state === 'placeholder') {
        panelBody.textContent = text;
      } else {
        panelBody.innerHTML = linkify(text);
      }
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      const value = input.value.trim();
      if (!value) return;

      const engine = engineSelect.value;
      const wordCount = wordCountInput.value.trim();
      const submitBtn = form.querySelector('button');

      if (placeholder) placeholder.remove();

      addLogEntry(`[you · ${ENGINE_LABELS[engine]}${wordCount ? ` · ${wordCount}w` : ''}] `, value);
      panelMeta.textContent = `${ENGINE_LABELS[engine]}${wordCount ? ` · ${wordCount}w` : ''}`;

      input.value = '';
      submitBtn.disabled = true;
      setPanel('pending', 'Researching and summarizing...');

      try {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: value, engine, wordCount })
        });
        const data = await response.json();

        if (data.error) {
          setPanel('error', data.error);
        } else if (data.warning) {
          // The Worker exhausted its retry attempts — show the draft but make the
          // failure visible instead of silently presenting it as a clean result.
          if (data.outline) addLogEntry('[outline] ', data.outline);
          const failedChecks = (data.log || [])
            .flatMap(entry => entry.issues || [])
            .filter((v, i, arr) => arr.indexOf(v) === i); // de-dupe repeated issues across attempts
          const notice = `⚠ ${data.warning}` +
            (failedChecks.length ? `\n\nUnresolved issues:\n- ${failedChecks.join('\n- ')}` : '') +
            `\n\n---\n\n${data.text}`;
          setPanel('error', notice);
        } else {
          if (data.outline) addLogEntry('[outline] ', data.outline);
          setPanel('', data.text);
        }
      } catch (err) {
        setPanel('error', err.message);
      } finally {
        submitBtn.disabled = false;
        wordCountInput.value = '';
        input.focus();
      }
    });
  </script>

</body>
</html>
