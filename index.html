<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>
<style>
  :root {
    --bg: #12141c;
    --bg-raised: #1a1d28;
    --line: #2a2e3d;
    --text: #e9eaee;
    --text-dim: #8b8f9e;
    --accent: #f2b705;
    --accent-dim: #7a611f;
    --ok: #4fd1c5;
    --font-display: 'Space Grotesk', system-ui, sans-serif;
    --font-body: 'IBM Plex Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(circle at 20% 15%, rgba(242, 183, 5, 0.06), transparent 40%),
      radial-gradient(circle at 80% 85%, rgba(79, 209, 197, 0.05), transparent 40%);
  }

  .card {
    width: 100%;
    max-width: 560px;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 40px 36px 32px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--ok);
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 0 0 rgba(79, 209, 197, 0.6);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(79, 209, 197, 0.55); }
    70%  { box-shadow: 0 0 0 8px rgba(79, 209, 197, 0); }
    100% { box-shadow: 0 0 0 0 rgba(79, 209, 197, 0); }
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(2rem, 5vw, 2.6rem);
    line-height: 1.1;
    margin: 0 0 10px;
    letter-spacing: -0.01em;
  }

  h1 span {
    color: var(--accent);
  }

  p.lead {
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.5;
    margin: 0 0 28px;
    max-width: 42ch;
  }

  .console {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #0d0f16;
    overflow: hidden;
  }

  .console-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
  }

  .console-header .chip {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--line);
  }

  .console-header span.label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 6px;
    letter-spacing: 0.05em;
  }

  #log {
    max-height: 180px;
    overflow-y: auto;
    padding: 14px;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.7;
  }

  #log .entry {
    color: var(--text);
    opacity: 0;
    animation: appear 0.25s ease forwards;
  }

  #log .entry .ts {
    color: var(--text-dim);
    margin-right: 8px;
  }

  #log .placeholder {
    color: var(--text-dim);
    font-style: italic;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  form {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-top: 1px solid var(--line);
  }

  .prompt-symbol {
    font-family: var(--font-mono);
    color: var(--accent);
    font-size: 14px;
  }

  input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 6px 0;
  }

  input[type="text"]::placeholder {
    color: var(--text-dim);
  }

  button {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #0d0f16;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 9px 16px;
    cursor: pointer;
    transition: filter 0.15s ease, transform 0.15s ease;
  }

  button:hover {
    filter: brightness(1.08);
  }

  button:active {
    transform: scale(0.97);
  }

  button:focus-visible,
  input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  footer {
    margin-top: 22px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  @media (prefers-reduced-motion: reduce) {
    .dot { animation: none; }
    #log .entry { animation: none; opacity: 1; }
  }
</style>
</head>
<body>

  <main class="card">
    <div class="status-row">
      <span class="dot"></span>
      <span>Status: Live</span>
    </div>

    <h1>Hello<span>.</span></h1>
    <p class="lead">My website is live. Type something below and press Enter — it'll show up right here.</p>

    <div class="console">
      <div class="console-header">
        <span class="chip"></span>
        <span class="chip"></span>
        <span class="chip"></span>
        <span class="label">console</span>
      </div>

      <div id="log">
        <div class="entry placeholder" id="placeholder-line">Waiting for input&hellip;</div>
      </div>

      <form id="entry-form">
        <span class="prompt-symbol">&gt;</span>
        <input
          type="text"
          id="entry-input"
          placeholder="Type a message"
          autocomplete="off"
          maxlength="200"
        />
        <button type="submit">Enter</button>
      </form>
    </div>

    <footer>Press Enter or click the button to submit.</footer>
  </main>

  <script>
    const form = document.getElementById('entry-form');
    const input = document.getElementById('entry-input');
    const log = document.getElementById('log');
    const placeholder = document.getElementById('placeholder-line');

    function timestamp() {
      const d = new Date();
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const value = input.value.trim();
      if (!value) return;

      if (placeholder) placeholder.remove();

      const entry = document.createElement('div');
      entry.className = 'entry';

      const ts = document.createElement('span');
      ts.className = 'ts';
      ts.textContent = timestamp();

      entry.appendChild(ts);
      entry.appendChild(document.createTextNode(value));

      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;

      input.value = '';
      input.focus();
    });
  </script>

</body>
</html>
